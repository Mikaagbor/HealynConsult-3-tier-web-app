name: CI/CD Dockerized 3-Tier App

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    # 3️⃣ Build backend image
    - name: Build backend Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/healyn-backend:latest ./backend

    # 4️⃣ Build frontend image
    - name: Build frontend Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/healyn-frontend:latest ./frontend

    # 5️⃣ Push backend image
    - name: Push backend image
      run: |
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/healyn-backend:latest

    # 6️⃣ Push frontend image
    - name: Push frontend image
      run: |
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/healyn-frontend:latest

    # 7️⃣ SSH into VM using password
    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        port: 22
        script: |
          cd ~/HealynConsult || mkdir ~/HealynConsult
          git pull origin main
          docker-compose down
          docker-compose up -d --build